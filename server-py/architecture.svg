<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
  <defs>
    <!-- 蓝色箭头：主要请求/数据流 -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <!-- 橙色箭头：外部 API 调用 -->
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <!-- 节点阴影 -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- 标题 -->
  <text x="480" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">
    Mint AI Chat — Python FastAPI 服务端架构图
  </text>

  ==================== Row 1: Client ====================
  <rect x="380" y="45" width="200" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">🖥️ 前端客户端</text>
  <text x="480" y="82" text-anchor="middle" font-size="11" fill="#3b82f6">React SPA (Vite)</text>

  <!-- 箭头：Client → Routes -->
  <line x1="480" y1="95" x2="480" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  ==================== Row 2: FastAPI Routes ====================
  <rect x="120" y="120" width="540" height="115" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">📁 API 路由层 (routes/)</text>

  <!-- conversations route -->
  <rect x="145" y="158" width="160" height="34" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="225" y="179" text-anchor="middle" font-size="12" fill="#065f46">conversations.py</text>

  <!-- messages route -->
  <rect x="320" y="158" width="160" height="34" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="179" text-anchor="middle" font-size="12" fill="#065f46">messages.py (SSE)</text>

  <!-- settings route -->
  <rect x="145" y="200" width="160" height="27" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="225" y="218" text-anchor="middle" font-size="11" fill="#065f46">settings.py</text>

  <!-- agents / weather route -->
  <rect x="320" y="200" width="160" height="27" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="218" text-anchor="middle" font-size="11" fill="#065f46">agents.py / weather.py</text>

  <!-- 入口标注 -->
  <text x="520" y="137" text-anchor="start" font-size="10" fill="#64748b">app.py + main.py (入口)</text>

  <!-- 箭头：Routes → Services -->
  <line x1="480" y1="235" x2="480" y2="268" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  ==================== Row 3: Services ====================
  <rect x="60" y="270" width="640" height="165" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">⚙️ 服务层 (services/)</text>

  <!-- Row 1 -->
  <rect x="85" y="310" width="175" height="38" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="172" y="333" text-anchor="middle" font-size="12" fill="#5b21b6">message_service</text>

  <rect x="280" y="310" width="175" height="38" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="367" y="333" text-anchor="middle" font-size="12" fill="#5b21b6">settings_service</text>

  <!-- ai_proxy (核心模块，高亮) -->
  <rect x="475" y="310" width="205" height="38" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="577" y="333" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">⭐ ai_proxy (核心)</text>

  <!-- Row 2 -->
  <rect x="85" y="365" width="175" height="38" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="172" y="388" text-anchor="middle" font-size="12" fill="#5b21b6">encryption (AES-256)</text>

  <rect x="280" y="365" width="175" height="38" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="367" y="388" text-anchor="middle" font-size="12" fill="#5b21b6">conversation_service</text>

  <rect x="475" y="365" width="205" height="38" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="577" y="388" text-anchor="middle" font-size="12" fill="#5b21b6">qweather + tool_registry</text>

  <!-- 箭头：Services → Data -->
  <line x1="480" y1="435" x2="480" y2="468" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  ==================== Row 4: Data Layer ====================
  <rect x="140" y="470" width="500" height="75" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="492" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">🗄️ 数据层</text>

  <!-- repositories -->
  <rect x="160" y="505" width="195" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="257" y="524" text-anchor="middle" font-size="11" fill="#92400e">repositories/ (3个)</text>

  <!-- SQLite -->
  <rect x="410" y="502" width="210" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="515" y="516" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">SQLite (data.db)</text>
  <text x="515" y="530" text-anchor="middle" font-size="10" fill="#ef4444">WAL模式 · 外键约束</text>

  <!-- 箭头：Repos → SQLite -->
  <line x1="355" y1="520" x2="405" y2="520" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  ==================== External APIs ====================
  <!-- AI API -->
  <rect x="740" y="130" width="180" height="55" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">🤖 AI API</text>
  <text x="830" y="170" text-anchor="middle" font-size="10" fill="#64748b">OpenAI 兼容接口</text>

  <!-- QWeather -->
  <rect x="740" y="370" width="180" height="55" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="392" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">🌤️ QWeather API</text>
  <text x="830" y="410" text-anchor="middle" font-size="10" fill="#64748b">天气预报服务</text>

  <!-- 箭头：ai_proxy → AI API -->
  <path d="M 680 329 L 710 329 L 710 157 L 735 157" fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- 箭头：qweather → QWeather API -->
  <line x1="680" y1="384" x2="735" y2="384" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  ==================== Legend ====================
  <rect x="280" y="575" width="400" height="85" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="593" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">图例</text>

  <!-- 蓝色箭头 -->
  <line x1="305" y1="612" x2="355" y2="612" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="370" y="616" text-anchor="start" font-size="11" fill="#475569">请求/数据流 (Request → DB → Response)</text>

  <!-- 橙色箭头 -->
  <line x1="305" y1="635" x2="355" y2="635" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="370" y="639" text-anchor="start" font-size="11" fill="#475569">外部 API 调用 (AI / 天气)</text>

  <!-- 高亮标记 -->
  <rect x="305" y="648" width="50" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="370" y="659" text-anchor="start" font-size="11" fill="#475569">核心高亮模块</text>

</svg>